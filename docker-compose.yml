# Lokal geliştirme için PostgreSQL.
# API'yi `dotnet run` ile host üzerinde çalıştırırken bu veritabanına
# (localhost:5432) bağlanır — appsettings.json'daki DefaultConnection ile eşleşir.
# Not: entegrasyon testleri Postgres'i Testcontainers ile kendisi ayağa kaldırır,
# bu compose SADECE API'yi elle çalıştırmak içindir.
services:
  db:
    image: postgres:16-alpine
    container_name: bekci-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bekci
    ports:
      - "5432:5432"
    volumes:
      - bekci-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bekci"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bekci-pgdata:
